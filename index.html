<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cowboy Steak House</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
    body { background:#111; color:#fff; }

    header {
      padding:15px;
      text-align:center;
      font-size:24px;
      font-weight:bold;
      background:#000;
    }

    /* Slider */
    .slider {
      width:100%;
      height:220px;
      overflow:hidden;
      position:relative;
    }

    .slides {
      display:flex;
      width:300%;
      animation: slide 12s infinite;
    }

    .slides img {
      width:100%;
      height:220px;
      object-fit:cover;
    }

    @keyframes slide {
      0% { transform:translateX(0); }
      33% { transform:translateX(-100%); }
      66% { transform:translateX(-200%); }
      100% { transform:translateX(0); }
    }

    /* Grid Menu */
    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(120px,1fr));
      gap:10px;
      padding:15px;
    }

    .grid-item {
      background:#222;
      padding:15px;
      text-align:center;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .grid-item:hover { background:#333; }

    /* Category Section */
    .category {
      padding:15px;
    }

    .category h2 { margin-bottom:10px; }

    .menu-item {
      display:flex;
      justify-content:space-between;
      padding:10px;
      border-bottom:1px solid #333;
    }

    /* Bottom Navigation (Mobile/Tablet only) */
    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#000;
      padding:10px 0;
      z-index:1000;
    }

    .bottom-nav div {
      text-align:center;
      font-size:14px;
      cursor:pointer;
    }

    /* Desktop Navbar (Modern Top Bar) */
    .top-nav {
      display:none;
      position:sticky;
      top:0;
      width:100%;
      background:#000;
      padding:15px 30px;
      z-index:1000;
      align-items:center;
      justify-content:space-between;
    }

    .top-nav .logo {
      font-size:22px;
      font-weight:bold;
    }

    .top-nav .nav-links {
      display:flex;
      gap:20px;
    }

    .top-nav .nav-links div {
      cursor:pointer;
      transition:0.3s;
    }

    .top-nav .nav-links div:hover {
      color:#f59e0b;
    }

    /* Desktop Layout Adjustments */
    @media (min-width:1024px) {
      .container {
        max-width:1100px;
        margin:auto;
      }

      .bottom-nav {
        display:none;
      }

      .top-nav {
        display:flex;
      }

      header {
        display:none;
      }
    }
  </style>
</head>
<body>

<!-- Desktop Top Navigation -->
<div class="top-nav">
  <div class="logo">Cowboy Steak House</div>
  <div class="nav-links">
    <div onclick="navigate('home')">Home</div>
    <div onclick="navigate('categories')">Categories</div>
    <div onclick="navigate('search')">Search</div>
    <div onclick="navigate('notifications')">Alerts</div>
    <div onclick="navigate('account')">Account</div>
  </div>
</div>

<header>Cowboy Steak House</header>

<div class="container">
  <!-- Slider -->
  <div class="slider">
    <div class="slides">
      <img src="https://picsum.photos/800/400?1" />
      <img src="https://picsum.photos/800/400?2" />
      <img src="https://picsum.photos/800/400?3" />
    </div>
  </div>

  <!-- Quick Menu Grid -->
  <div class="grid">
    <div class="grid-item">Steaks</div>
    <div class="grid-item">Burgers</div>
    <div class="grid-item">Drinks</div>
    <div class="grid-item">Desserts</div>
    <div class="grid-item">Offers</div>
    <div class="grid-item">Combos</div>
  </div>

  <!-- Categories -->
  <div class="category">
    <h2>Full Menu</h2>
    <div class="menu-item"><span>Ribeye Steak</span><span>$25</span></div>
    <div class="menu-item"><span>Grilled Chicken</span><span>$15</span></div>
    <div class="menu-item"><span>Cheese Burger</span><span>$10</span></div>
    <div class="menu-item"><span>French Fries</span><span>$5</span></div>
  </div>
</div>

<!-- Bottom Nav (Mobile Only) -->
<div class="bottom-nav">
  <div onclick="navigate('home')">Home</div>
  <div onclick="navigate('categories')">Categories</div>
  <div onclick="navigate('search')">Search</div>
  <div onclick="navigate('notifications')">Alerts</div>
  <div onclick="navigate('account')">Account</div>
</div>

<script>
function navigate(tab) {
  alert("Navigating to " + tab);
}
</script>

</body>
</html>
